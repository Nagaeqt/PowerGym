<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PowerGym - Recuperar Senha</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container-auth">
    <section class="left-auth">
      <div class="left-auth-content">
        <img src="assets/logo-powergym.png" alt="Logo PowerGym" class="logo-auth" />
        <h1>Recuperação</h1>
        <p>
          Informe seu e-mail para recuperar o acesso à sua conta.
        </p>
      </div>
    </section>

    <section class="right-auth">
      <div class="card-auth">
        <h2>Recuperar senha</h2>
        <p>Digite o e-mail cadastrado</p>

        <form onsubmit="recuperarSenha(event)">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" required />
          </div>

          <button type="submit" class="btn">Enviar</button>
        </form>

        <div class="links-auth">
          <a href="index.html">Voltar ao login</a>
        </div>

        <div id="mensagem" class="mensagem"></div>
      </div>
    </section>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
